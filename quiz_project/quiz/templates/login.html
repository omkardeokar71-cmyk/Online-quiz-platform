{% extends 'base.html' %}

{% block content %}
    <div class="card">
        <h2>Login to Your Account</h2>
        {% if form.errors %}
            <div style="color:#d73a49; margin-bottom:1rem;">
                <p>Please fix the errors below.</p>
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button">Login</button>
        </form>

        <p style="margin-top: 1rem;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
{% endblock %}
