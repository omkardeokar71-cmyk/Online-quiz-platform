{% extends 'base.html' %}

{% block content %}
    <div class="card">
        <h2>Create an Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button">Register</button>
        </form>
        <p style="margin-top: 1rem;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
{% endblock %}
